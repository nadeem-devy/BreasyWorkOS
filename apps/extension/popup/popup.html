<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breasy WorkOS Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; width: 280px; background: #fff; }
    .header { background: #1c2b3d; color: #fff; padding: 12px 16px; display: flex; align-items: center; gap: 8px; }
    .header .logo { width: 24px; height: 24px; background: rgba(255,255,255,0.15); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; }
    .header h1 { font-size: 13px; font-weight: 600; flex: 1; }
    .content { padding: 16px; }

    /* Status banner */
    .status-banner { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; margin-bottom: 12px; }
    .status-banner.active { background: #ecfdf5; border: 1px solid #a7f3d0; }
    .status-banner.idle { background: #fffbeb; border: 1px solid #fde68a; }
    .status-banner.offline { background: #f3f4f6; border: 1px solid #d1d5db; }
    .status-banner .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .status-banner .status-dot.active { background: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,0.2); }
    .status-banner .status-dot.idle { background: #f59e0b; box-shadow: 0 0 0 3px rgba(245,158,11,0.2); }
    .status-banner .status-dot.offline { background: #9ca3af; }
    .status-banner .status-info { flex: 1; }
    .status-banner .status-label { font-size: 13px; font-weight: 600; color: #111827; }
    .status-banner .status-sub { font-size: 11px; color: #6b7280; margin-top: 1px; }

    /* Refresh button */
    .refresh-btn { background: none; border: none; cursor: pointer; padding: 4px; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
    .refresh-btn:hover { background: rgba(255,255,255,0.15); }
    .refresh-btn svg { width: 16px; height: 16px; fill: #fff; }
    .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .info-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 12px; border-bottom: 1px solid #f3f4f6; }
    .info-row:last-child { border: none; }
    .info-label { color: #6b7280; }
    .info-value { color: #111827; font-weight: 500; }
    .app-bars { margin-top: 12px; }
    .app-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .app-bar-label { font-size: 11px; color: #6b7280; width: 50px; }
    .app-bar-track { flex: 1; height: 6px; background: #f3f4f6; border-radius: 3px; overflow: hidden; }
    .app-bar-fill { height: 100%; border-radius: 3px; }
    .app-bar-time { font-size: 11px; color: #374151; width: 40px; text-align: right; }
    .login-form { display: flex; flex-direction: column; gap: 8px; }
    .login-form input { padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; }
    .login-form button { padding: 8px; background: #1c2b3d; color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; }
    .login-form button:hover { background: #253a52; }
    .error { color: #ef4444; font-size: 12px; padding: 6px 0; }
    .footer { padding: 8px 16px; border-top: 1px solid #f3f4f6; display: flex; gap: 8px; }
    .footer button { flex: 1; padding: 6px; background: none; border: 1px solid #d1d5db; border-radius: 6px; font-size: 12px; color: #6b7280; cursor: pointer; }
    .footer button:hover { background: #f9fafb; }
    .footer .refresh-footer-btn { display: flex; align-items: center; justify-content: center; gap: 4px; }
    .footer .refresh-footer-btn svg { width: 12px; height: 12px; fill: #6b7280; }
    #login-view, #dashboard-view { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">B</div>
    <h1>Breasy WorkOS Tracker</h1>
    <button class="refresh-btn" id="header-refresh-btn" title="Refresh status">
      <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
    </button>
  </div>

  <div id="login-view" class="content">
    <p style="font-size:12px;color:#6b7280;margin-bottom:10px">Sign in with your Breasy WorkOS account</p>
    <form class="login-form" id="login-form">
      <input type="email" id="login-email" placeholder="Email" required>
      <input type="password" id="login-password" placeholder="Password" required>
      <div id="login-error" class="error" style="display:none"></div>
      <button type="submit">Sign In</button>
    </form>
  </div>

  <div id="dashboard-view" class="content">
    <div class="status-banner" id="status-banner">
      <div class="status-dot" id="status-dot"></div>
      <div class="status-info">
        <div class="status-label" id="status-text">Checking...</div>
        <div class="status-sub" id="status-sub"></div>
      </div>
    </div>

    <div class="info-row">
      <span class="info-label">Current App</span>
      <span class="info-value" id="current-app">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Session</span>
      <span class="info-value" id="session-time">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Events Buffered</span>
      <span class="info-value" id="buffer-count">0</span>
    </div>

    <div class="app-bars" id="app-bars"></div>
  </div>

  <div class="footer" id="footer">
    <button id="refresh-btn" class="refresh-footer-btn">
      <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      Sync Now
    </button>
    <button id="logout-btn" style="display:none">Sign Out</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
